version: '3.8'

services:
  traderview-server:
    build:
      context: .
      dockerfile: traderview/traderview.Server/Dockerfile
    container_name: traderview-server
    ports:
      - "5000:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Docker
      - ASPNETCORE_URLS=http://+:8080
      - CORS_ALLOWED_ORIGINS=http://localhost:3000,http://localhost:5173
      # Overrides the appsettings json hierarchy for document storage
      - FinancialModelingPrep__OutputFilePath=/app/documents
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      # Maps the named persistent volume to the container path
      - traderview-doc-storage:/app/documents
    networks:
      - traderview-network

  traderview-client:
    build:
      context: .
      dockerfile: traderview/traderview.client/Dockerfile
    container_name: traderview-client
    ports:
      - "3000:80"
    depends_on:
      - traderview-server
    networks:
      - traderview-network

networks:
  traderview-network:
    driver: bridge

# Defined named volume to persist your documents outside container lifecycle
volumes:
  traderview-doc-storage:
    driver: local