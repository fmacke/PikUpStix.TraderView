services:
  traderview-server:
    build:
      context: .
      dockerfile: traderview/traderview.Server/Dockerfile
    container_name: traderview-server
    ports:
      - "5000:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_URLS=http://+:8080
      # Database configuration - override these in a .env file or docker-compose.override.yml
      - Database__Host=${DB_HOST:-host.docker.internal}
      - Database__User=${DB_USER:-sa}
      - Database__Password=${DB_PASSWORD:-Gogogo123!}
      - Database__DbName=${DB_NAME:-TradingBE}
      - ConnectionStrings__TradingDatabase=Server=${DB_HOST:-host.docker.internal};Database=${DB_NAME:-TradingBE};User Id=${DB_USER:-sa};Password=${DB_PASSWORD:-Gogogo123!};TrustServerCertificate=true;Encrypt=false;
      # CORS origins
      - Cors__AllowedOrigins__0=http://localhost:3000
    networks:
      - traderview-network

  traderview-client:
    build:
      context: .
      dockerfile: traderview/traderview.client/Dockerfile
    container_name: traderview-client
    ports:
      - "3000:80"
    networks:
      - traderview-network

networks:
  traderview-network:
    driver: bridge
